name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Step 1 - Download the repository
        uses: actions/checkout@v4
      - name: Step 2 - Prepare GitHub Pages
        uses: actions/configure-pages@v5
      - name: Step 3 - Package the site files
        uses: actions/upload-pages-artifact@v3 
        with:
          path: "."
      - name: Step 4 - Deploy to GitHub Pages
        uses: actions/deploy-pages@v3