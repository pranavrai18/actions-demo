name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Step 1 - Download the repository
        uses: actions/checkout@v4
      - name: Step 2 - Install Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
      - name: Step 3 - Install project dependencies
        run: npm install
      - name: Step 4 - Run the tests
        run: npm test